<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrepAI - Interview Prep</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark');
          } else {
            document.body.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loading-container {
          display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; background-color: #F8F9FF; margin: 0;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loading-container { background-color: #0D1117; }
        }
        .loading { position: relative; width: 112px; height: 70px; }
        .loading::after { content: ""; display: table; clear: both; }
        .loading .finger { float: left; margin: 0 2px 0 0; width: 20px; height: 100%; }
        .loading .finger-1 { animation: finger-1-animation 2s infinite ease-out; }
        .loading .finger-1 span { animation: finger-1-animation-span 2s infinite ease-out; }
        .loading .finger-1 i { animation: finger-1-animation-i 2s infinite ease-out; }
        .loading .finger-2 { animation: finger-2-animation 2s infinite ease-out; }
        .loading .finger-2 span { animation: finger-2-animation-span 2s infinite ease-out; }
        .loading .finger-2 i { animation: finger-2-animation-i 2s infinite ease-out; }
        .loading .finger-3 { animation: finger-3-animation 2s infinite ease-out; }
        .loading .finger-3 span { animation: finger-3-animation-span 2s infinite ease-out; }
        .loading .finger-3 i { animation: finger-3-animation-i 2s infinite ease-out; }
        .loading .finger-4 { animation: finger-4-animation 2s infinite ease-out; }
        .loading .finger-4 span { animation: finger-4-animation-span 2s infinite ease-out; }
        .loading .finger-4 i { animation: finger-4-animation-i 2s infinite ease-out; }
        .loading .finger-item { position: relative; width: 100%; height: 100%; border-radius: 6px 6px 8px 8px; background: #0F172A; }
        @media (prefers-color-scheme: dark) { .loading .finger-item { background: #E2E8F0; } }
        .loading .finger-item span { position: absolute; left: 0; top: 0; width: 100%; height: auto; padding: 5px 5px 0 5px; }
        .loading .finger-item span::before, .loading .finger-item span::after { content: ''; position: relative; display: block; margin: 0 0 2px 0; width: 100%; height: 2px; background: #4F46E5; }
        @media (prefers-color-scheme: dark) { .loading .finger-item span::before, .loading .finger-item span::after { background: #6366F1; } }
        .loading .finger-item i { position: absolute; left: 3px; bottom: 3px; width: 14px; height: 14px; border-radius: 10px 10px 7px 7px; background: #4F46E5; }
        @media (prefers-color-scheme: dark) { .loading .finger-item i { background: #6366F1; } }
        .loading .last-finger { position: relative; float: left; width: 24px; height: 100%; overflow: hidden; }
        .loading .last-finger-item { position: absolute; right: 0; top: 32px; width: 110%; height: 20px; border-radius: 0 5px 14px 0; background: #0F172A; animation: finger-5-animation 2s infinite linear; }
        @media (prefers-color-scheme: dark) { .loading .last-finger-item { background: #E2E8F0; } }
        .loading .last-finger-item i { position: absolute; left: 0; top: -8px; width: 22px; height: 8px; background: #0F172A; overflow: hidden; }
        @media (prefers-color-scheme: dark) { .loading .last-finger-item i { background: #E2E8F0; } }
        .loading .last-finger-item i::after { content: ''; position: absolute; left: 0; bottom: 0; width: 34px; height: 20px; border-radius: 0 0 15px 15px; background: #4F46E5; }
        @media (prefers-color-scheme: dark) { .loading .last-finger-item i::after { background: #6366F1; } }
        @keyframes finger-1-animation { 0%, 20%, 41%, 100% {padding:12px 0 5px 0;} 29%, 35% {padding:4px 0 24px 0;} }
        @keyframes finger-1-animation-span { 0%, 20%, 41%, 100% {top:0;} 29%, 35% {top:-7px;} }
        @keyframes finger-1-animation-i { 0%, 20%, 41%, 100% {bottom:3px;height:14px;border-radius:10px 10px 7px 7px;} 29%, 35% {bottom:8px;height:12px;border-radius:7px 7px 4px 4px;} }
        @keyframes finger-2-animation { 0%, 24%, 45%, 100% {padding:6px 0 2px 0;} 33%, 39% {padding:2px 0 16px 0;} }
        @keyframes finger-2-animation-span { 0%, 24%, 45%, 100% {top:0;} 33%, 39% {top:-7px;} }
        @keyframes finger-2-animation-i { 0%, 24%, 45%, 100% {bottom:3px;height:14px;border-radius:10px 10px 7px 7px;} 33%, 39% {bottom:8px;height:12px;border-radius:7px 7px 4px 4px;} }
        @keyframes finger-3-animation { 0%, 28%, 49%, 100% {padding:0 0 0 0;} 37%, 43% {padding:0 0 12px 0;} }
        @keyframes finger-3-animation-span { 0%, 28%, 49%, 100% {top:0;} 37%, 43% {top:-7px;} }
        @keyframes finger-3-animation-i { 0%, 28%, 49%, 100% {bottom:3px;height:14px;border-radius:10px 10px 7px 7px;} 37%, 43% {bottom:8px;height:12px;border-radius:7px 7px 4px 4px;} }
        @keyframes finger-4-animation { 0%, 32%, 53%, 100% {padding:8px 0 3px 0;} 41%, 47% {padding:4px 0 20px 0;} }
        @keyframes finger-4-animation-span { 0%, 32%, 53%, 100% {top:0;} 41%, 47% {top:-7px;} }
        @keyframes finger-4-animation-i { 0%, 32%, 53%, 100% {bottom:3px;height:14px;border-radius:10px 10px 7px 7px;} 41%, 47% {bottom:8px;height:12px;border-radius:7px 7px 4px 4px;} }
        @keyframes finger-5-animation { 0%, 34%, 60%, 100% {top:32px;right:0;border-radius:0 5px 14px 0;transform:rotate(0deg);} 43%, 50% {top:20px;right:2px;border-radius:0 8px 20px 0;transform:rotate(-12deg);} }
      </style>
      <div class="initial-loading-container">
        <div class="loading">
          <div class="finger finger-1"><div class="finger-item"><span></span><i></i></div></div>
          <div class="finger finger-2"><div class="finger-item"><span></span><i></i></div></div>
          <div class="finger finger-3"><div class="finger-item"><span></span><i></i></div></div>
          <div class="finger finger-4"><div class="finger-item"><span></span><i></i></div></div>
          <div class="last-finger"><div class="last-finger-item"><i></i></div></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
